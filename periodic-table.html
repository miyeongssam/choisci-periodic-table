<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인터랙티브 주기율표 — 최과학</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --bg3: #22263a;
  --text: #e8eaf0;
  --text2: #9aa0b8;
  --border: rgba(255,255,255,0.08);
  --radius: 8px;
  --radius-lg: 12px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  padding: 16px;
}

h1 { display: none; }

#top-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

#brand {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.3px;
  white-space: nowrap;
}

#brand span {
  color: #5b8ef0;
}

#search-bar {
  flex: 1;
  min-width: 160px;
  max-width: 300px;
  padding: 7px 12px;
  font-size: 13px;
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg3);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
#search-bar::placeholder { color: var(--text2); }
#search-bar:focus { border-color: rgba(91,142,240,0.5); }

#filter-row {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 10px;
}

.fbtn {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 99px;
  border: 0.5px solid var(--border);
  background: var(--bg3);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.fbtn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
.fbtn.active { color: #fff; border-color: transparent; font-weight: 500; }

#grid {
  display: grid;
  grid-template-columns: repeat(18, 1fr);
  gap: 2px;
  margin-bottom: 8px;
}

.cell {
  aspect-ratio: 1;
  border-radius: 3px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 0.5px solid transparent;
  transition: transform 0.12s, opacity 0.2s;
  position: relative;
  min-width: 0;
}
.cell:hover { transform: scale(1.18); z-index: 20; border-color: rgba(255,255,255,0.4); }
.cell.selected { outline: 2px solid #fff; outline-offset: 1px; transform: scale(1.1); z-index: 15; }
.cell.dim { opacity: 0.12; }
.cell.highlight { outline: 2px solid #fff; transform: scale(1.1); z-index: 15; }
.cell .num { font-size: 6.5px; line-height: 1; align-self: flex-start; padding-left: 2px; opacity: 0.8; }
.cell .sym { font-size: 13px; font-weight: 600; line-height: 1.1; }
.cell .nm { font-size: 5.5px; opacity: 0.8; text-align: center; }
.gap-cell { background: transparent !important; cursor: default; }
.gap-cell:hover { transform: none !important; }

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 8px 0 12px;
}
.leg-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  color: var(--text2);
}
.leg-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}

#detail-card {
  display: none;
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  margin-top: 4px;
  animation: fadeIn 0.2s ease;
}
#detail-card.show { display: block; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

#dc-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
}
#dc-symbol-box {
  width: 60px;
  height: 60px;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
#dc-sym { font-size: 28px; font-weight: 600; color: #fff; line-height: 1; }
#dc-num-label { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 1px; }
#dc-name { font-size: 20px; font-weight: 600; color: var(--text); }
#dc-cat { font-size: 12px; color: var(--text2); margin-top: 3px; }

#dc-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 10px;
}
.dc-stat {
  background: var(--bg3);
  border-radius: var(--radius);
  padding: 9px 11px;
}
.dc-stat-label { font-size: 10px; color: var(--text2); margin-bottom: 3px; }
.dc-stat-val { font-size: 13px; font-weight: 500; color: var(--text); }

#dc-desc {
  font-size: 12px;
  color: var(--text2);
  line-height: 1.7;
  padding: 10px 12px;
  background: var(--bg3);
  border-radius: var(--radius);
  border-left: 2px solid rgba(91,142,240,0.5);
}

.series-label-cell {
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 7px;
  color: var(--text2);
  text-align: center;
  cursor: default;
}
.series-label-cell:hover { transform: none !important; }

@media (max-width: 600px) {
  body { padding: 8px; }
  .cell .sym { font-size: 9px; }
  .cell .nm, .cell .num { display: none; }
  #dc-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<h1>인터랙티브 주기율표</h1>

<div id="top-bar">
  <div id="brand">⚗️ <span>최과학</span> 주기율표</div>
  <input id="search-bar" type="text" placeholder="원소 검색 (이름, 기호, 번호)..." oninput="doSearch(this.value)" />
</div>

<div id="filter-row"></div>
<div id="grid"></div>
<div class="legend" id="legend"></div>

<div id="detail-card">
  <div id="dc-header">
    <div id="dc-symbol-box">

      <div id="dc-num-label"></div>
    </div>
    <div>
      <div id="dc-name"></div>
      <div id="dc-cat"></div>

  <div id="dc-grid">
    <div class="dc-stat"><div class="dc-stat-label">원자량</div><div class="dc-stat-val" id="dc-mass"></div></div>
    <div class="dc-stat"><div class="dc-stat-label">족 / 주기</div><div class="dc-stat-val" id="dc-gp"></div></div>
    <div class="dc-stat"><div class="dc-stat-label">전기음성도</div><div class="dc-stat-val" id="dc-en"></div></div>
    <div class="dc-stat"><div class="dc-stat-label">상온 상태</div><div class="dc-stat-val" id="dc-phase"></div></div>
    <div class="dc-stat"><div class="dc-stat-label">녹는점</div><div class="dc-stat-val" id="dc-mp"></div></div>
    <div class="dc-stat"><div class="dc-stat-label">끓는점</div><div class="dc-stat-val" id="dc-bp"></div></div>
    <div class="dc-stat"><div class="dc-stat-label">전자배치</div><div class="dc-stat-val" id="dc-ec"></div></div>
    <div class="dc-stat"><div class="dc-stat-label">발견 연도</div><div class="dc-stat-val" id="dc-yr"></div></div>
  </div>
  <div id="dc-desc"></div>
</div>

const CATS = Object.keys(CAT_COLORS);
let activeFilter = null;
let searchVal = '';

function getColor(cat) { return CAT_COLORS[cat] || '#444'; }

function buildFilters() {
  const row = document.getElementById('filter-row');
  CATS.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'fbtn';
    btn.textContent = cat;
    btn.dataset.cat = cat;
    btn.onclick = () => toggleFilter(cat, btn);
    row.appendChild(btn);
  });
}

function toggleFilter(cat, btn) {
  if (activeFilter === cat) {
    activeFilter = null;
    document.querySelectorAll('.fbtn').forEach(b => { b.classList.remove('active'); b.style.background = ''; });
  } else {
    activeFilter = cat;
    document.querySelectorAll('.fbtn').forEach(b => { b.classList.remove('active'); b.style.background = ''; });
    btn.classList.add('active');
    btn.style.background = getColor(cat);
  }
  renderDim();
}

function renderDim() {
  document.querySelectorAll('.cell[data-n]').forEach(c => {
    const el = ELEMENTS[parseInt(c.dataset.n) - 1];
    let dim = false;
    if (activeFilter && el.cat !== activeFilter) dim = true;
    if (searchVal && !matchSearch(el, searchVal)) dim = true;
    c.classList.toggle('dim', dim);
    c.classList.toggle('highlight', searchVal !== '' && matchSearch(el, searchVal));
  });
}

function matchSearch(el, v) {
  v = v.toLowerCase();
  return el.nm.toLowerCase().includes(v) || el.s.toLowerCase().includes(v) || String(el.n).includes(v);
}

function doSearch(v) {
  searchVal = v.trim();
  renderDim();
}

function buildGrid() {
  const grid = document.getElementById('grid');
  const cells = {};
  ELEMENTS.forEach(el => { if (el.g > 0) cells[`${el.p}-${el.g}`] = el; });

  const lanth = ELEMENTS.filter(e => e.cat === '란타넘족');
  const actin = ELEMENTS.filter(e => e.cat === '악티늄족');

  for (let row = 1; row <= 7; row++) {
    for (let col = 1; col <= 18; col++) {
      const el = cells[`${row}-${col}`];
      const div = document.createElement('div');
      if (el) {
        div.className = 'cell';
        div.dataset.n = el.n;
        div.style.background = getColor(el.cat);
        div.style.color = '#fff';
        div.innerHTML = `<span class="num">${el.n}</span><span class="sym">${el.s}</span><span class="nm">${el.nm}</span>`;
        div.onclick = () => showDetail(el);
        div.title = `${el.nm} (${el.s}) — ${el.cat}`;
      } else {
        div.className = 'gap-cell cell';
      }
      grid.appendChild(div);
    }
  }

  // 란타넘족 행
  for (let i = 0; i < 2; i++) { const d = document.createElement('div'); d.className = 'gap-cell cell'; grid.appendChild(d); }
  const lbl = document.createElement('div');
  lbl.className = 'series-label-cell cell';
  lbl.textContent = '란타넘족';
  grid.appendChild(lbl);
  lanth.forEach(el => {
    const div = document.createElement('div');
    div.className = 'cell'; div.dataset.n = el.n;
    div.style.background = getColor(el.cat); div.style.color = '#fff';
    div.innerHTML = `<span class="num">${el.n}</span><span class="sym">${el.s}</span><span class="nm">${el.nm}</span>`;
    div.onclick = () => showDetail(el);
    grid.appendChild(div);
  });
  const rem1 = 18 - 2 - 1 - lanth.length;
  for (let i = 0; i < rem1; i++) { const d = document.createElement('div'); d.className = 'gap-cell cell'; grid.appendChild(d); }

  // 악티늄족 행
  for (let i = 0; i < 2; i++) { const d = document.createElement('div'); d.className = 'gap-cell cell'; grid.appendChild(d); }
  const abl = document.createElement('div');
  abl.className = 'series-label-cell cell';
  abl.textContent = '악티늄족';
  grid.appendChild(abl);
  actin.forEach(el => {
    const div = document.createElement('div');
    div.className = 'cell'; div.dataset.n = el.n;
    div.style.background = getColor(el.cat); div.style.color = '#fff';
    div.innerHTML = `<span class="num">${el.n}</span><span class="sym">${el.s}</span><span class="nm">${el.nm}</span>`;
    div.onclick = () => showDetail(el);
    grid.appendChild(div);
  });
  const rem2 = 18 - 2 - 1 - actin.length;
  for (let i = 0; i < rem2; i++) { const d = document.createElement('div'); d.className = 'gap-cell cell'; grid.appendChild(d); }
}

function showDetail(el) {
  const dc = document.getElementById('detail-card');
  dc.classList.add('show');
  document.getElementById('dc-symbol-box').style.background = getColor(el.cat);
  document.getElementById('dc-sym').textContent = el.s;
  document.getElementById('dc-num-label').textContent = `원자번호 ${el.n}`;
  document.getElementById('dc-name').textContent = el.nm;
  document.getElementById('dc-cat').textContent = el.cat + (el.g > 0 ? ` · ${el.p}주기 ${el.g}족` : ` · ${el.p}주기`);
  document.getElementById('dc-mass').textContent = el.w;
  document.getElementById('dc-gp').textContent = el.g > 0 ? `${el.g}족 / ${el.p}주기` : `f블록 / ${el.p}주기`;
  document.getElementById('dc-en').textContent = el.en > 0 ? el.en : '—';
  document.getElementById('dc-phase').textContent = el.phase;
  document.getElementById('dc-mp').textContent = el.mp !== 0 ? `${el.mp} °C` : '—';
  document.getElementById('dc-bp').textContent = el.bp !== 0 ? `${el.bp} °C` : '—';
  document.getElementById('dc-ec').textContent = el.ec;
  document.getElementById('dc-yr').textContent = el.yr;
  document.getElementById('dc-desc').textContent = el.desc;
  dc.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function buildLegend() {
  const leg = document.getElementById('legend');
  CATS.forEach(cat => {
    const item = document.createElement('div');
    item.className = 'leg-item';
    const dot = document.createElement('div');
    dot.className = 'leg-dot';
    dot.style.background = getColor(cat);
    item.appendChild(dot);
    item.appendChild(document.createTextNode(cat));
    leg.appendChild(item);
  });
}

buildFilters();
buildGrid();
buildLegend();
</script>
